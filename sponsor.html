<script>
document.addEventListener('DOMContentLoaded', () => {

  const easterGif = document.querySelector('.easter-gif3');
  const notification = document.querySelector('.easter-notification3');
  const counter = document.querySelector('#easter-count');

  const STORAGE_KEY = "izzziland_easter_1";

  let collected = JSON.parse(
    localStorage.getItem(STORAGE_KEY)
  ) || {
    easter1: false,
    easter2: false,
    easter3: false
  };

  function updateCounter() {

    const total = Object
      .values(collected)
      .filter(Boolean)
      .length;

    counter.textContent = `${total}/5`;
  }

  updateCounter();

  // уже найдена
  if (collected.easter3) {
    easterGif.remove();
    return;
  }

  // показать через 10 секунд
  setTimeout(() => {

    easterGif.classList.add('visible');

  }, 10000);

  // клик
  easterGif.addEventListener('click', () => {

    if (collected.easter3) return;

    collected.easter3 = true;

    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(collected)
    );

    updateCounter();

    easterGif.classList.add('explode');

    setTimeout(() => {

      easterGif.remove();

    }, 1200);

    notification.classList.remove('hide');
    notification.classList.add('show');

    setTimeout(() => {

      notification.classList.remove('show');
      notification.classList.add('hide');

    }, 2500);

  });

});
</script>
